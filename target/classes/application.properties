# Server Configuration
server.port=8080
server.servlet.context-path=/api


# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/newsletter_campaign
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JPA - Hibernate
spring.jpa.hibernate.ddl-auto=update

# H2 Console (for quick local testing without Postgres ? swap datasource block above with below)
# spring.datasource.url=jdbc:h2:mem:newsletterdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT Settings ? must match keys used in JwtTokenProvider (@Value)
app.jwtSecret=i-am-a-super-secret-i-am-a-super-secret-i-am-a-super-secret
app.jwtExpirationMs=86400000

# Scheduler ? set to 60000 (60s) for production; lower for testing e.g. 10000 (10s)
app.scheduler.fixedDelay=60000

# Application Name
app.name=Newsletter Email Campaign Manager

# ===== Logging =====
# Root level
logging.level.root=INFO

# Show all [MOCK] and [SCHEDULER] log lines from your own code
logging.level.com.guvi=DEBUG

# See SQL queries in console
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log to a rolling file as well as console
logging.file.name=logs/newsletter-campaign.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
